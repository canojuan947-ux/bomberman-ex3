<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bomberman Ultimate</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <h1>BOMBERMAN ULTIMATE</h1>

    <div class="hud">

        <div>Puntaje: <span id="score">0</span></div>

        <div>Vidas: <span id="lives">3</span></div>

        <div>Nivel: <span id="level">1</span></div>

        <div>Enemigos: <span id="enemies">0</span></div>

    </div>

    <div id="game"></div>

    <div class="controls">

        <p>WASD = Movimiento</p>

        <p>ESPACIO = Bombas</p>

        <p>Elimina todos los enemigos para avanzar</p>

    </div>

    <script src="{{ url_for('static', filename='game.js') }}"></script>

</body>
</html>
